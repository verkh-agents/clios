<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to CLiOS...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #000;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry {
      display: none;
      margin-top: 1.5rem;
    }
    .retry a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      font-size: 0.9rem;
    }
    .retry a:hover { border-color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Connecting to CLiOS...</h1>
    <p>Opening the app automatically.</p>
    <div class="retry" id="retry">
      <p>Didn't open? <a id="retry-link" href="#">Tap here to try again</a></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const host = params.get('host');
    const port = params.get('port') || '18789';
    const token = params.get('token');

    const deepLink = `clios://connect?host=${encodeURIComponent(host)}&port=${encodeURIComponent(port)}&token=${encodeURIComponent(token)}`;

    document.getElementById('retry-link').href = deepLink;

    if (!host || !token) {
      document.querySelector('h1').textContent = 'Invalid link';
      document.querySelector('p').textContent = 'Missing connection parameters.';
      document.querySelector('.spinner').style.display = 'none';
    } else {
      window.location.href = deepLink;
      setTimeout(() => {
        document.getElementById('retry').style.display = 'block';
      }, 2000);
    }
  </script>
</body>
</html>
