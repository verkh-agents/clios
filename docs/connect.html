<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to CLiOS...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #000;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; }
    .error { color: #ff453a; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Opening CLiOS...</h1>
    <p>You will be redirected to the app automatically.</p>
    <p class="error" id="error">
      CLiOS is not installed or the link is invalid.<br>
      Make sure CLiOS is installed on your device.
    </p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const host = params.get('host');
    const port = params.get('port') || '18789';
    const token = params.get('token');

    if (!host || !token) {
      document.getElementById('error').style.display = 'block';
      document.querySelector('h1').textContent = 'Invalid link';
      document.querySelector('p').style.display = 'none';
    } else {
      const deepLink = `clios://connect?host=${encodeURIComponent(host)}&port=${encodeURIComponent(port)}&token=${encodeURIComponent(token)}`;
      window.location.href = deepLink;

      // Show error after 2s if app didn't open
      setTimeout(() => {
        document.getElementById('error').style.display = 'block';
      }, 2000);
    }
  </script>
</body>
</html>
